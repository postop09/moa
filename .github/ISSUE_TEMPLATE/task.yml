name: 작업 요청
description: 리팩터링, 문서, 설정 등 일반 작업을 등록합니다
title: '[Task] '
labels:
  - task
  - needs-triage
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 무엇을 해야 하는지 한 줄로 작성해 주세요.
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 상세 내용
      description: 작업 범위, 참고 링크, 완료 조건을 작성해 주세요.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
